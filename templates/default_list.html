{% extends 'base.html' %}

{% block title %}
{{ object_plural_spaces | title }}
{% endblock %}

{% block leftcontent %}
<div class="row">
    <a href="{% url 'add_'|add:object_singular_underscores %}">Add {{ object_singular_spaces }}</a>
</div>
{% endblock %}

{% block rightcontent %}
{% for object in objects %}
<div class="row">
    <a href="{% url 'edit_'|add:object_singular_underscores pk=object.pk %}">{{ object.name }}</a>
</div>
{% endfor %}
{% endblock %}
