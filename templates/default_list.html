{% extends 'base.html' %}

{% block title %}
{{ object_plural }}
{% endblock %}

{% block leftcontent %}
<div class="row">
    <a href="{% url 'add_'|add:object_singular %}">Add {{ object_singular }}</a>
</div>
{% endblock %}

{% block rightcontent %}
{% for object in objects %}
<div class="row">
    <a href="{% url 'edit_'|add:object_singular pk=object.pk %}">{{ object.name }}</a>
</div>
{% endfor %}
{% endblock %}
