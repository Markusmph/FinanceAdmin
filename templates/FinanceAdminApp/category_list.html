{% extends 'base.html' %}

{% block title %}
Categories
{% endblock %}

{% block leftcontent %}
<div class="row">
    <a href="{% url 'add_category' %}">Add category</a>
</div>
{% endblock %}

{% block rightcontent %}
    {% for category in categories %}
        <p>
            <a href="{% url 'edit_category' pk=category.pk %}"><b>{{category.name}}</b></a>: {{category.description}}
        </p>
    {% endfor %}
{% endblock %}
