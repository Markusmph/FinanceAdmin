
{% extends 'login_base.html' %}

{% block content %}
<h1>Registering a new user</h1>
<form action="{% url 'signup' %}" method="POST">
    {% csrf_token %}

    {{ form_user.as_p }}
    {{ form_profile.as_p }}
    <br>
    <input type="submit" value="Sign up">
    <a href="{% url 'login' %}">Back</a>

</form>
{% endblock %}
